version: '3.8'

# Three services, each does exactly one thing.
# init runs db migrate and exits — webserver and scheduler wait for it to complete.
# Production note: swap SequentialExecutor + SQLite for CeleryExecutor + PostgreSQL + Redis.

services:
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: thisisasecretkey12345
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - airflow-data:/opt/airflow
    command: airflow db migrate
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: thisisasecretkey12345
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - airflow-data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./artifacts:/opt/airflow/artifacts
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: thisisasecretkey12345
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - airflow-data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./artifacts:/opt/airflow/artifacts
    command: airflow scheduler
    restart: always

volumes:
  airflow-data:
